<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>iTactics</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      overscroll-behavior: none;
    }
    canvas#gameCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      outline: none;
    }

    /* ── HTML UI overlay ── */
    #gameUI {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .action-bar {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 5px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 8px;
      border: 1px solid #444466;
      pointer-events: auto;
    }
    .action-btn {
      width: 80px;
      height: 44px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .action-btn:active:not(:disabled) {
      filter: brightness(1.3);
    }

    .action-bar-skills, .action-bar-actions {
      display: flex;
      gap: 4px;
    }
    .action-separator {
      width: 1px;
      background: #555577;
      margin: 2px 2px;
    }
    .undo-btn {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top, 0px));
      right: 10px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: rgba(106, 90, 58, 0.85);
      color: white;
      font-size: 20px;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .undo-btn:active {
      filter: brightness(1.3);
    }
    .skill-btn {
      min-width: 52px;
      height: 34px;
      padding: 0 8px;
      border: 2px solid #555577;
      border-radius: 6px;
      background: #3a3a5a;
      color: #ccc;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .skill-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .skill-btn:active:not(:disabled) {
      filter: brightness(1.3);
    }
    .skill-btn.skill-selected {
      border-color: #ffcc44;
      color: #fff;
      background: #4a4a6a;
    }

    /* Cooldown badge on skill buttons */
    .skill-cooldown-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #cc4444;
      color: #fff;
      font-size: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .turn-order-bar {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      pointer-events: auto;
    }
    .turn-slot {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      box-sizing: border-box;
    }

    .unit-info-panel {
      position: absolute;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 10px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 6px;
      border: 1px solid #aaaaaa;
      pointer-events: auto;
      white-space: nowrap;
    }
    .uip-name {
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .uip-stats-row {
      display: flex;
      gap: 14px;
    }
    .uip-col {
      display: flex;
      flex-direction: column;
      font-size: 11px;
      line-height: 1.3;
    }
    .uip-col-right { text-align: right; }
    .uip-hp { font-weight: 600; }
    .uip-fat { color: #cc8844; font-size: 10px; }
    .uip-ap { color: #aad4ff; }
    .uip-mp { color: #88cc88; font-size: 10px; }
    .uip-combat { font-size: 11px; color: #aaa; padding: 1px 6px; }
    .uip-status {
      font-size: 9px;
      color: #cc8844;
      margin-top: 1px;
    }
    .speed-toggle {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      right: calc(10px + env(safe-area-inset-right, 0px));
      width: 44px;
      height: 32px;
      border: 1px solid #666688;
      border-radius: 6px;
      background: rgba(26, 26, 46, 0.8);
      color: #ccccff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .speed-toggle:active {
      filter: brightness(1.4);
    }

    .damage-popup {
      position: absolute;
      transform: translate(-50%, -100%);
      font-size: 20px;
      font-weight: bold;
      color: #ff4444;
      text-shadow: 0 0 4px black, 0 0 4px black;
      pointer-events: none;
      animation: dmgFloat 1s ease-out forwards;
      white-space: nowrap;
    }
    .damage-popup.miss {
      color: #999999;
      font-size: 16px;
    }
    .damage-popup.kill {
      color: #ff0000;
      font-size: 24px;
    }
    .damage-popup.armor {
      color: #8899bb;
      font-size: 16px;
    }
    .damage-popup.cp-popup {
      color: #eec844;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 0 6px black, 0 0 4px #886622;
    }
    @keyframes dmgFloat {
      0% { opacity: 1; transform: translate(-50%, -100%); }
      100% { opacity: 0; transform: translate(-50%, -250%); }
    }

    /* ── Enemy detail panel (long-press) ── */
    .enemy-detail-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: calc(50px + env(safe-area-inset-top, 0px));
      pointer-events: auto;
      z-index: 20;
    }
    .enemy-detail-panel {
      width: 220px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 10px 12px;
      background: rgba(20, 20, 40, 0.95);
      border-radius: 8px;
      border: 1px solid #555577;
      color: #ddd;
      font-size: 12px;
      line-height: 1.4;
    }
    .edp-header {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .edp-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .edp-label { color: #999; font-size: 11px; min-width: 24px; }
    .edp-value { color: #ccc; font-size: 11px; white-space: nowrap; }
    .edp-bar {
      flex: 1;
      height: 8px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    .edp-bar-fill { display: block; height: 100%; border-radius: 3px; }
    .edp-bar-fill.hp-green { background: #44bb44; }
    .edp-bar-fill.hp-yellow { background: #bbbb44; }
    .edp-bar-fill.hp-red { background: #bb4444; }
    .edp-stats {
      display: flex;
      gap: 8px;
      font-size: 10px;
      color: #aaa;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .edp-section { margin-bottom: 4px; }
    .edp-passive {
      font-size: 10px;
      color: #88bbdd;
      font-style: italic;
    }
    .edp-equip {
      font-size: 11px;
      color: #ccaa88;
    }
    .edp-equip.edp-armor { color: #8899aa; }
    .edp-bonus { font-size: 11px; color: #88cc88; padding: 2px 0; }

    .edp-equip-slot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      gap: 4px;
    }
    .edp-slot-label { font-size: 9px; color: #777; min-width: 28px; }
    .edp-slot-value { flex: 1; font-size: 11px; color: #ccaa88; }
    .edp-slot-action {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #666;
      background: #3a3a5a;
      color: #ccc;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .edp-slot-action:disabled { opacity: 0.35; cursor: default; }
    .edp-slot-action:active:not(:disabled) { filter: brightness(1.3); }
    .edp-bag-header { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .edp-bag-empty { font-size: 10px; color: #666; font-style: italic; }
    .edp-bag-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
      gap: 4px;
    }
    .edp-bag-actions { display: flex; align-items: center; gap: 4px; }
    .edp-bag-name { font-size: 11px; color: #cccc88; }
    .edp-ap-cost { font-size: 8px; color: #888; }

    .edp-morale { font-size: 11px; margin-right: 8px; }
    .edp-fatigue { font-size: 10px; color: #cc8844; }
    .edp-effects {
      font-size: 10px;
      color: #cc8844;
      margin-bottom: 4px;
    }
    .edp-divider {
      border-top: 1px solid #444466;
      margin: 6px 0;
    }
    .edp-hit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .edp-hit-label { font-size: 12px; color: #aaa; }
    .edp-hit-value { font-size: 16px; font-weight: 700; color: #ffcc44; }
    .edp-modifiers { margin-bottom: 6px; }
    .edp-mod-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      padding: 1px 0;
    }
    .edp-mod-label { color: #888; }
    .edp-mod-value { font-weight: 600; min-width: 32px; text-align: right; }
    .edp-dmg-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .edp-armor-info {
      font-size: 10px;
      color: #8899aa;
    }

    /* ── Attack preview panel (tap-to-confirm) ── */
    .attack-preview-panel {
      position: absolute;
      top: calc(44px + env(safe-area-inset-top, 0px));
      left: calc(6px + env(safe-area-inset-left, 0px));
      width: 110px;
      padding: 6px 8px;
      background: rgba(26, 26, 46, 0.92);
      border-radius: 6px;
      border: 1px solid #ffcc44;
      pointer-events: auto;
      color: #ddd;
      font-size: 10px;
      line-height: 1.3;
    }
    .attack-preview-panel .edp-header {
      font-size: 11px;
      margin-bottom: 3px;
    }
    .edp-skill-desc {
      font-size: 9px;
      color: #aabbcc;
      margin-bottom: 3px;
      font-style: italic;
    }
    .edp-skill-effects {
      font-size: 9px;
      color: #ccaa66;
      margin-bottom: 3px;
    }
    .attack-preview-panel .edp-hit-value {
      font-size: 14px;
    }
    .attack-preview-hint {
      font-size: 9px;
      color: #ffcc44;
      text-align: center;
      margin-top: 4px;
    }

    /* ── Battle End Screen ── */
    .battle-end-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      pointer-events: auto;
      z-index: 30;
    }
    .battle-end-panel {
      width: 260px;
      padding: 16px;
      background: rgba(20, 20, 40, 0.95);
      border-radius: 10px;
      border: 1px solid #555577;
      color: #ddd;
      font-size: 12px;
    }
    .battle-end-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
    }
    .xp-table { margin-bottom: 12px; }
    .xp-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #333355;
    }
    .xp-row.xp-levelup { background: rgba(255, 204, 68, 0.1); }
    .xp-name { flex: 1; font-size: 11px; color: #ccc; }
    .xp-gained { font-size: 11px; color: #88cc88; min-width: 50px; text-align: right; }
    .xp-level { font-size: 10px; color: #aaa; min-width: 48px; text-align: right; }
    .xp-levelup .xp-level { color: #ffcc44; font-weight: 600; }
    .xp-bar {
      width: 40px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .xp-bar-fill {
      height: 100%;
      background: #5588cc;
      border-radius: 2px;
    }
    .xp-levelup .xp-bar-fill { background: #ffcc44; }
    .battle-end-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #446688;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .battle-end-btn:active { filter: brightness(1.3); }
    .battle-end-btn-row {
      display: flex; gap: 10px; width: 100%;
    }
    .battle-end-btn-row .battle-end-btn { flex: 1; }
    .battle-end-forfeit {
      background: #664433;
    }

    /* ── Level-Up Modal ── */
    .levelup-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      pointer-events: auto;
      z-index: 30;
    }
    .levelup-panel {
      width: 280px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 14px;
      background: rgba(20, 20, 40, 0.95);
      border-radius: 10px;
      border: 1px solid #ffcc44;
      color: #ddd;
      font-size: 12px;
    }
    .levelup-header {
      font-size: 14px;
      font-weight: 700;
      color: #ffcc44;
      text-align: center;
      margin-bottom: 4px;
    }
    .levelup-hint {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-bottom: 10px;
    }
    .levelup-stat-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 4px;
      border-radius: 4px;
      border: 1px solid transparent;
    }
    .levelup-stat-row:active { background: rgba(255, 255, 255, 0.05); }
    .levelup-selected {
      border-color: #ffcc44;
      background: rgba(255, 204, 68, 0.08);
    }
    .levelup-stat-name {
      flex: 1;
      font-size: 11px;
      color: #ccc;
    }
    .levelup-stat-value {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      min-width: 28px;
      text-align: right;
    }
    .levelup-stars {
      display: flex;
      gap: 1px;
      min-width: 36px;
    }
    .levelup-star {
      font-size: 10px;
    }
    .levelup-star.filled { color: #ffcc44; }
    .levelup-star.empty { color: #444; }
    .levelup-range {
      font-size: 10px;
      color: #88aacc;
      min-width: 32px;
      text-align: right;
    }
    .levelup-increase {
      font-size: 12px;
      font-weight: 700;
      color: #44cc44;
      min-width: 24px;
      text-align: right;
    }
    .levelup-new-value {
      font-size: 10px;
      color: #aaa;
      min-width: 36px;
    }
    .levelup-confirm-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #886622;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .levelup-confirm-btn:disabled { opacity: 0.4; cursor: default; }
    .levelup-confirm-btn:active:not(:disabled) { filter: brightness(1.3); }

    /* ── Battle End gold display ── */
    .battle-end-gold {
      font-size: 14px;
      font-weight: 600;
      color: #ffcc44;
      text-align: center;
      margin-bottom: 10px;
    }

    /* ── Store Screen ── */
    .store-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      pointer-events: auto;
      z-index: 30;
    }
    .store-panel {
      width: 280px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 14px;
      background: rgba(20, 20, 40, 0.95);
      border-radius: 10px;
      border: 1px solid #555577;
      color: #ddd;
      font-size: 12px;
    }
    .store-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .store-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .store-gold {
      font-size: 14px;
      font-weight: 600;
      color: #ffcc44;
    }
    .store-section-label {
      font-size: 13px;
      font-weight: 700;
      color: #aabbcc;
      margin-bottom: 6px;
      border-bottom: 1px solid #333355;
      padding-bottom: 4px;
    }
    .store-category { margin-bottom: 4px; }
    .store-category-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 4px;
      font-size: 12px;
      font-weight: 600;
      color: #99aacc;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .store-category-header:active { color: #ccddeeff; }
    .store-category-arrow {
      font-size: 10px;
      transition: transform 0.15s;
    }
    .store-category-arrow.open { transform: rotate(90deg); }
    .store-item-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 4px;
      border-bottom: 1px solid rgba(51, 51, 85, 0.5);
    }
    .store-item-name {
      flex: 1;
      font-size: 11px;
      color: #ccc;
    }
    .store-item-price {
      font-size: 11px;
      font-weight: 600;
      color: #ffcc44;
      min-width: 36px;
      text-align: right;
    }
    .store-item-price.cant-afford { color: #666; }
    .store-buy-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      background: #446688;
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .store-buy-btn:disabled { opacity: 0.3; cursor: default; }
    .store-buy-btn:active:not(:disabled) { filter: brightness(1.3); }
    .store-back-btn {
      padding: 4px 8px;
      border: 1px solid #555577;
      border-radius: 4px;
      background: #2a2a3a;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .store-back-btn:active { filter: brightness(1.3); }
    .store-detail-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin: 8px 0 4px;
    }
    .store-detail-stats {
      font-size: 11px;
      color: #aabbcc;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .store-detail-price {
      font-size: 12px;
      font-weight: 600;
      color: #ffcc44;
      text-align: center;
      margin-bottom: 10px;
    }
    .store-assign-label {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .store-unit-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 4px;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .store-unit-row:active { background: rgba(255, 255, 255, 0.05); }
    .store-unit-row.disabled { opacity: 0.4; cursor: default; }
    .store-unit-info { flex: 1; }
    .store-unit-name {
      font-size: 11px;
      color: #ccc;
    }
    .store-unit-current {
      font-size: 10px;
      color: #888;
    }
    .store-unit-equip {
      font-size: 10px;
      font-weight: 600;
      color: #44cc44;
    }
    .store-unit-cant {
      font-size: 10px;
      color: #cc4444;
    }
    .store-continue-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      border: none;
