<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>iTactics</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      overscroll-behavior: none;
    }
    canvas#gameCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      outline: none;
    }

    /* ── HTML UI overlay ── */
    #gameUI {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .action-bar {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 5px;
      background: magenta;
      border-radius: 8px;
      border: 3px solid yellow;
      pointer-events: auto;
    }
    .action-btn {
      width: 80px;
      height: 44px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .action-btn:active:not(:disabled) {
      filter: brightness(1.3);
    }

    .turn-order-bar {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      pointer-events: auto;
    }
    .turn-slot {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      box-sizing: border-box;
    }

    .unit-info-panel {
      position: absolute;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      padding: 8px 10px;
      background: cyan;
      border-radius: 6px;
      border: 3px solid red;
      pointer-events: auto;
    }
    .unit-name {
      color: #ffffff;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .hp-bar {
      width: 100%;
      height: 12px;
      background: #333333;
      border-radius: 3px;
      border: 1px solid #555555;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 3px;
      background: #44bb44;
      transition: width 0.2s;
    }
    .hp-text {
      color: #cccccc;
      font-size: 11px;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="gameUI">
    <!-- DEBUG: static element, no JS needed. Remove after confirming overlay works. -->
    <div id="debugOverlay" style="
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: red;
      color: white;
      font-size: 24px;
      font-weight: bold;
      padding: 20px 40px;
      border: 4px solid yellow;
      pointer-events: auto;
      z-index: 999;
    ">DEBUG: UI OVERLAY IS HERE</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
