<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>iTactics</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      overscroll-behavior: none;
    }
    canvas#gameCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      outline: none;
    }

    /* ── HTML UI overlay ── */
    #gameUI {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .action-bar {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 5px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 8px;
      border: 1px solid #444466;
      pointer-events: auto;
    }
    .action-btn {
      width: 80px;
      height: 44px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .action-btn:active:not(:disabled) {
      filter: brightness(1.3);
    }

    .action-bar-skills, .action-bar-actions {
      display: flex;
      gap: 4px;
    }
    .action-separator {
      width: 1px;
      background: #555577;
      margin: 2px 2px;
    }
    .undo-btn {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top, 0px));
      right: 10px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: rgba(106, 90, 58, 0.85);
      color: white;
      font-size: 20px;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .undo-btn:active {
      filter: brightness(1.3);
    }
    .skill-btn {
      min-width: 52px;
      height: 34px;
      padding: 0 8px;
      border: 2px solid #555577;
      border-radius: 6px;
      background: #3a3a5a;
      color: #ccc;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .skill-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .skill-btn:active:not(:disabled) {
      filter: brightness(1.3);
    }
    .skill-btn.skill-selected {
      border-color: #ffcc44;
      color: #fff;
      background: #4a4a6a;
    }

    .turn-order-bar {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      pointer-events: auto;
    }
    .turn-slot {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      box-sizing: border-box;
    }

    .unit-info-panel {
      position: absolute;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      padding: 8px 10px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 6px;
      border: 1px solid #aaaaaa;
      pointer-events: auto;
    }
    .unit-name {
      color: #ffffff;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .hp-bar {
      width: 100%;
      height: 12px;
      background: #333333;
      border-radius: 3px;
      border: 1px solid #555555;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 3px;
      background: #44bb44;
      transition: width 0.2s;
    }
    .hp-text {
      color: #cccccc;
      font-size: 11px;
      margin-top: 2px;
    }
    .speed-toggle {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      right: calc(10px + env(safe-area-inset-right, 0px));
      width: 44px;
      height: 32px;
      border: 1px solid #666688;
      border-radius: 6px;
      background: rgba(26, 26, 46, 0.8);
      color: #ccccff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .speed-toggle:active {
      filter: brightness(1.4);
    }

    .damage-popup {
      position: absolute;
      transform: translate(-50%, -100%);
      font-size: 20px;
      font-weight: bold;
      color: #ff4444;
      text-shadow: 0 0 4px black, 0 0 4px black;
      pointer-events: none;
      animation: dmgFloat 1s ease-out forwards;
      white-space: nowrap;
    }
    .damage-popup.miss {
      color: #999999;
      font-size: 16px;
    }
    .damage-popup.kill {
      color: #ff0000;
      font-size: 24px;
    }
    @keyframes dmgFloat {
      0% { opacity: 1; transform: translate(-50%, -100%); }
      100% { opacity: 0; transform: translate(-50%, -250%); }
    }

    /* ── Enemy detail panel (long-press) ── */
    .enemy-detail-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: calc(50px + env(safe-area-inset-top, 0px));
      pointer-events: auto;
      z-index: 20;
    }
    .enemy-detail-panel {
      width: 220px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 10px 12px;
      background: rgba(20, 20, 40, 0.95);
      border-radius: 8px;
      border: 1px solid #555577;
      color: #ddd;
      font-size: 12px;
      line-height: 1.4;
    }
    .edp-header {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .edp-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .edp-label { color: #999; font-size: 11px; min-width: 24px; }
    .edp-value { color: #ccc; font-size: 11px; white-space: nowrap; }
    .edp-bar {
      flex: 1;
      height: 8px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    .edp-bar-fill { display: block; height: 100%; border-radius: 3px; }
    .edp-bar-fill.hp-green { background: #44bb44; }
    .edp-bar-fill.hp-yellow { background: #bbbb44; }
    .edp-bar-fill.hp-red { background: #bb4444; }
    .edp-stats {
      display: flex;
      gap: 8px;
      font-size: 10px;
      color: #aaa;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .edp-section { margin-bottom: 4px; }
    .edp-equip {
      font-size: 11px;
      color: #ccaa88;
    }
    .edp-equip.edp-armor { color: #8899aa; }
    .edp-morale { font-size: 11px; margin-right: 8px; }
    .edp-fatigue { font-size: 10px; color: #cc8844; }
    .edp-effects {
      font-size: 10px;
      color: #cc8844;
      margin-bottom: 4px;
    }
    .edp-divider {
      border-top: 1px solid #444466;
      margin: 6px 0;
    }
    .edp-hit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .edp-hit-label { font-size: 12px; color: #aaa; }
    .edp-hit-value { font-size: 16px; font-weight: 700; color: #ffcc44; }
    .edp-modifiers { margin-bottom: 6px; }
    .edp-mod-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      padding: 1px 0;
    }
    .edp-mod-label { color: #888; }
    .edp-mod-value { font-weight: 600; min-width: 32px; text-align: right; }
    .edp-dmg-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .edp-armor-info {
      font-size: 10px;
      color: #8899aa;
    }

    /* ── Attack preview panel (tap-to-confirm) ── */
    .attack-preview-panel {
      position: absolute;
      top: calc(44px + env(safe-area-inset-top, 0px));
      left: calc(6px + env(safe-area-inset-left, 0px));
      width: 110px;
      padding: 6px 8px;
      background: rgba(26, 26, 46, 0.92);
      border-radius: 6px;
      border: 1px solid #ffcc44;
      pointer-events: auto;
      color: #ddd;
      font-size: 10px;
      line-height: 1.3;
    }
    .attack-preview-panel .edp-header {
      font-size: 11px;
      margin-bottom: 3px;
    }
    .attack-preview-panel .edp-hit-value {
      font-size: 14px;
    }
    .attack-preview-hint {
      font-size: 9px;
      color: #ffcc44;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="gameUI"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
