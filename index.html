<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>iTactics</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      overscroll-behavior: none;
    }
    canvas#gameCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      outline: none;
    }

    /* ── HTML UI overlay ── */
    #gameUI {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .action-bar {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 5px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 8px;
      border: 1px solid #444466;
      pointer-events: auto;
    }
    .action-btn {
      width: 80px;
      height: 44px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .action-btn:active:not(:disabled) {
      filter: brightness(1.3);
    }

    .turn-order-bar {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      pointer-events: auto;
    }
    .turn-slot {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      box-sizing: border-box;
    }

    .unit-info-panel {
      position: absolute;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      padding: 8px 10px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 6px;
      border: 1px solid #aaaaaa;
      pointer-events: auto;
    }
    .unit-name {
      color: #ffffff;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .hp-bar {
      width: 100%;
      height: 12px;
      background: #333333;
      border-radius: 3px;
      border: 1px solid #555555;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 3px;
      background: #44bb44;
      transition: width 0.2s;
    }
    .hp-text {
      color: #cccccc;
      font-size: 11px;
      margin-top: 2px;
    }
    .speed-toggle {
      position: absolute;
      top: calc(5px + env(safe-area-inset-top, 0px));
      right: calc(10px + env(safe-area-inset-right, 0px));
      width: 44px;
      height: 32px;
      border: 1px solid #666688;
      border-radius: 6px;
      background: rgba(26, 26, 46, 0.8);
      color: #ccccff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .speed-toggle:active {
      filter: brightness(1.4);
    }

    .damage-popup {
      position: absolute;
      transform: translate(-50%, -100%);
      font-size: 20px;
      font-weight: bold;
      color: #ff4444;
      text-shadow: 0 0 4px black, 0 0 4px black;
      pointer-events: none;
      animation: dmgFloat 1s ease-out forwards;
      white-space: nowrap;
    }
    .damage-popup.miss {
      color: #999999;
      font-size: 16px;
    }
    .damage-popup.kill {
      color: #ff0000;
      font-size: 24px;
    }
    @keyframes dmgFloat {
      0% { opacity: 1; transform: translate(-50%, -100%); }
      100% { opacity: 0; transform: translate(-50%, -250%); }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="gameUI"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
